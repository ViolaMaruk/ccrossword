<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do czego służą równania</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Измененный фон: теперь используется background.jpg */
            background-image: url('background1.jpg');
            background-size: cover; /* Растянуть изображение на весь экран */
            background-position: center;
            background-attachment: fixed; /* Зафиксировать фон при прокрутке */
            background-repeat: no-repeat;
            
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .description {
            text-align: center;
            font-size: 1.1em;
            color: #555;
            margin: 0;
        }
        .task-card {
            background: #fff;
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #3498db;
            transition: background-color 0.4s, border-color 0.4s, transform 0.2s;
        }
        .task-card:hover {
            transform: translateY(-2px);
        }
        .task-card.correct-bg {
            background-color: #d4edda;
            border-left-color: #28a745;
        }
        .task-card.incorrect-bg {
            background-color: #f8d7da;
            border-left-color: #dc3545;
        }
        .task-text {
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        /* Стиль для встроенной картинки (весов) */
        .task-image {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: block;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 1em;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            flex-grow: 1;
            max-width: 300px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover { background-color: #2980b9; }
        button:active { transform: scale(0.97); }
        button.btn-hint { background-color: #f39c12; }
        button.btn-hint:hover { background-color: #d68910; }
        .feedback {
            font-weight: bold;
            margin-left: 10px;
        }
        .correct { color: #1e8449; }
        .incorrect { color: #c0392b; }
        .hint-text {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            font-style: italic;
            color: #856404;
            border-radius: 0 6px 6px 0;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Do czego służą równania</h1>
        <p class="description">Zapisz podane sytuacje w postaci równań. Używaj małych liter (np. x, y). Не забудьте загрузить фоновое изображение (background.jpg) и иллюстрацию весов (weight_scale.png) в ту же папку на GitHub!</p>
    </div>

    <div id="tasks-container">
        </div>

    <script>
        // БАЗА ЗADAŃ
        const tasksData = [
            {
                text: "Jeżeli liczbę x powiększymy o 12, to otrzymamy 41.",
                hint: "Słowo 'powiększymy o' oznacza matematyce dodawanie (+).",
                answers: ["x+12=41", "12+x=41"]
            },
            {
                text: "Liczba 27 jest 2 razy większa od x.",
                hint: "Zapisz '2 razy większa od x' jako 2x.",
                answers: ["2x=27", "2*x=27", "27=2x", "27=2*x"]
            },
            {
                text: "Liczba 2 razy mniejsza od y jest równa 35.",
                hint: "Dwa razy mniejsza to inaczej dzielenie przez 2 lub ułamek 0,5.",
                answers: ["y/2=35", "0.5y=35", "y:2=35", "1/2y=35", "0,5y=35"]
            },
            {
                text: "Liczba 21 jest o 8 większa od z.",
                hint: "Do liczby z musisz dodać 8, aby otrzymać 21.",
                answers: ["z+8=21", "8+z=21", "21-8=z"]
            },
            {
                text: "Liczba 47 jest o 16 mniejsza od t.",
                hint: "Od liczby t musisz odjąć 16, aby otrzymać 47.",
                answers: ["t-16=47", "47+16=t", "47=t-16"]
            },
            {
                text: "Za długopis i ołówek Magda zapłaciła 4,20 zł. Długopis był dwa razy droższy od ołówka. Oznacz cenę ołówka literą x.",
                hint: "Ołówek to x, długopis to 2x. Dodaj je do siebie.",
                answers: ["x+2x=4.20", "2x+x=4.20", "3x=4.20", "x+2x=4,20", "2x+x=4,20", "3x=4,20"]
            },
            {
                text: "Suma dwóch liczb, z których jedna jest 5,2 razy większa od drugiej, wynosi 23,48. (Mniejsza liczba to x)",
                hint: "Jedna liczba to x, a druga to 5,2x.",
                answers: ["x+5.2x=23.48", "5.2x+x=23.48", "6.2x=23.48"]
            },
            {
                // ЗАМЕНЕННОЕ ЗАДАНИЕ С КАРТИНКОЙ
                text: "Waga pozostaje w równowadze. Zapisz równanie na podstawie ilustracji:<br><img src='weight_scale.png' alt='Ilustracja wagi' class='task-image'>",
                hint: "Waga w równowadze oznacza, że lewa strona (=szalka) jest równa prawej stronie.",
                answers: ["x+1=5", "1+x=5", "x+1kg=5kg"]
            },
            {
                text: "Odcinek o długości 30 został podzielony na dwie części. Jedna ma długość 3, a druga x.",
                hint: "Suma obu części odcinka daje nam całość, czyli 30.",
                answers: ["3+x=30", "x+3=30", "30-x=3"]
            },
            {
                text: "Trójkąt prostokątny ma obwód równy 70 cm. Długości jego boków to: k, (k + 1) oraz (k + 9).",
                hint: "Obwód to suma wszystkich boków. Dodaj je wszystkie do siebie и приравняй к 70.",
                answers: ["k+k+1+k+9=70", "k+(k+1)+(k+9)=70", "3k+10=70"]
            },
            {
                text: "Liczba o 5 mniejsza od x stanowi 80% liczby x.",
                hint: "Liczba o 5 mniejsza to (x - 5). Pamiętaj, że 80% zapisujemy ułamkiem dziesiętnym jako 0,8.",
                answers: ["x-5=0.8x", "x-5=80%x"]
            },
            {
                text: "Liczba o 15% mniejsza od liczby x jest równa 17.",
                hint: "Cała liczba to 100%. Jeśli odejmiemy 15%, zostanie 85% z iksa (czyli 0,85x).",
                answers: ["x-0.15x=17", "0.85x=17", "x-15%x=17"]
            },
            {
                text: "Liczba 13 jest o 10% większa od liczby u.",
                hint: "Do liczby u (100%) musisz dodać jej 10%, co daje nam 110% (1,1u).",
                answers: ["u+0.1u=13", "1.1u=13", "u+10%u=13"]
            },
            {
                text: "Marek rozwiązał x zadań, a Sylwia o 5% więcej. Razem rozwiązali 82 zadania.",
                hint: "Marek to x. Sylwia to x + 0,05x (lub po prostu 1,05x). Razem to suma ich zadań.",
                answers: ["x+x+0.05x=82", "x+1.05x=82", "2.05x=82", "x+(x+0.05x)=82"]
            },
            {
                text: "Za korektor и kątomierz Ola zapłaciła 3,50 zł. Korektor był cztery razy droższy od kątomierza. Jeśli x to cena kątomierza, to:",
                hint: "Kątomierz = x, Korektor = 4x.",
                answers: ["x+4x=3.50", "4x+x=3.50", "5x=3.50", "x+4x=3.5", "5x=3,5"]
            },
            {
                text: "Trójkąt prostokątny ma boki: k, (k + 3) oraz (k + 6). Jego obwód wynosi 36 cm.",
                hint: "Dodaj wszystkie trzy boki и приравняй к 36.",
                answers: ["k+k+3+k+6=36", "k+(k+3)+(k+6)=36", "3k+9=36"]
            },
            {
                text: "Waga pozostaje w równowadze. Lewa szalka: [x kg] и [1 kg] | Prawa szalka: [1 kg][1 kg][1 kg][1 kg]",
                hint: "Waga w równowadze означает, что левая сторона равна правой.",
                answers: ["x+1=4", "1+x=4"]
            },
            {
                text: "Odcinek długości 80 podzielono na dwie części. Jedna мает długość x, a druga 8.",
                hint: "Część x dodać część 8 дает całe 80.",
                answers: ["x+8=80", "8+x=80", "80-x=8"]
            },
            {
                text: "Suma dwóch liczb, z których jedna jest 7,23 razy większa od drugiej, wynosi 32,92. (Mniejsza to x).",
                hint: "Druga liczba to 7,23x.",
                answers: ["x+7.23x=32.92", "7.23x+x=32.92", "8.23x=32.92"]
            },
            {
                text: "Marek rozwiązał x zadań, a Sylwia o 45% więcej. Razem rozwiązali 49 zadań.",
                hint: "Sylwia zrobiła 145% zadań Marka, czyli 1,45x.",
                answers: ["x+x+0.45x=49", "x+1.45x=49", "2.45x=49", "x+(x+0.45x)=49"]
            }
        ];

        const container = document.getElementById("tasks-container");

        // Automatyczne generowanie HTML dla wszystkich zadań
        tasksData.forEach((task, index) => {
            const taskNum = index + 1;
            const answersJson = JSON.stringify(task.answers).replace(/"/g, "'");

            const taskHTML = `
                <div class="task-card" id="card${taskNum}">
                    <div class="task-text">
                        <strong>${taskNum}.</strong> ${task.text}
                    </div>
                    <div class="input-group">
                        <input type="text" id="input${taskNum}" placeholder="Wpisz równanie...">
                        <button onclick="checkAnswer('input${taskNum}', 'card${taskNum}', 'feedback${taskNum}', ${answersJson})">Sprawdź</button>
                        <button class="btn-hint" onclick="toggleHint('hint${taskNum}')">Podpowiedź</button>
                        <span id="feedback${taskNum}" class="feedback"></span>
                    </div>
                    <div id="hint${taskNum}" class="hint-text">
                        ${task.hint}
                    </div>
                </div>
            `;
            container.innerHTML += taskHTML;
        });

        // Funkcja pokazywania/ukrywania подpowiedзи
        function toggleHint(hintId) {
            let hintElement = document.getElementById(hintId);
            if (hintElement.style.display === "block") {
                hintElement.style.display = "none";
            } else {
                hintElement.style.display = "block";
            }
        }

        // Funkcja sprawdzania odpowiedzi
        function checkAnswer(inputId, cardId, feedbackId, correctAnswers) {
            let userInput = document.getElementById(inputId).value;
            let feedbackElement = document.getElementById(feedbackId);
            let cardElement = document.getElementById(cardId);
            
            cardElement.classList.remove("correct-bg", "incorrect-bg");

            // Oczyszczanie wpisu: usuwamy spacje, zamieniamy przecinki на kropki
            let normalizedInput = userInput.replace(/\s+/g, '').toLowerCase();
            normalizedInput = normalizedInput.replace(',', '.');

            if (normalizedInput === "") {
                feedbackElement.textContent = "Wpisz odpowiedź!";
                feedbackElement.className = "feedback incorrect";
                return;
            }

            let isCorrect = correctAnswers.some(answer => answer.toLowerCase() === normalizedInput);

            if (isCorrect) {
                feedbackElement.textContent = "Dobrze!";
                feedbackElement.className = "feedback correct";
                cardElement.classList.add("correct-bg");
            } else {
                feedbackElement.textContent = "Spróbuj jeszcze raz.";
                feedbackElement.className = "feedback incorrect";
                cardElement.classList.add("incorrect-bg");
            }
        }
    </script>
</body>
</html>
